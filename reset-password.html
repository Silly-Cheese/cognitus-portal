<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognitus Portal | Reset Password</title>
    <meta name="theme-color" content="#0a1020" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="Cognitus Portal home">
          <span class="brand-mark brand-mark-text">C</span>
          <span class="brand-lockup">
            <span class="brand-wordmark">Cognitus Portal</span>
            <span class="brand-sub">Password Reset</span>
          </span>
        </a>
      </header>

      <main class="page-shell">
        <div class="narrow-shell">
          <span class="page-kicker">PASSWORD SETUP</span>
          <h1 class="page-title">Set your portal password.</h1>
          <p class="page-intro" id="statusText">Validating your reset link...</p>

          <section class="form-wrap" id="resetPanel" style="margin-top: 28px; display: none;">
            <form id="resetForm" class="apply-form">
              <div class="form-grid">
                <div class="form-group full">
                  <label class="form-label" for="employeeIdDisplay">Employee ID</label>
                  <input class="form-input" id="employeeIdDisplay" type="text" readonly />
                </div>

                <div class="form-group full">
                  <label class="form-label" for="newPassword">New Password</label>
                  <input class="form-input" id="newPassword" type="password" required />
                </div>

                <div class="form-group full">
                  <label class="form-label" for="confirmPassword">Confirm Password</label>
                  <input class="form-input" id="confirmPassword" type="password" required />
                </div>
              </div>

              <div id="formMessage" class="form-message"></div>

              <div class="form-actions">
                <button class="button button-primary" id="submitButton" type="submit">Set Password</button>
                <span class="inline-status" id="formStatus">Awaiting submission.</span>
              </div>
            </form>
          </section>
        </div>
      </main>

      <footer class="footer">
        <p>© 2026 Cognitus Portal. Internal use only.</p>
      </footer>
    </div>

    <script>
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymcLmLA_Ly4LZJ93QJ_tA3Vl08sr8g5Lui9Hw0-87osEtwTE1KSI2s36zhA45mP6kR/exec";

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      const statusText = document.getElementById("statusText");
      const resetPanel = document.getElementById("resetPanel");
      const resetForm = document.getElementById("resetForm");
      const employeeIdDisplay = document.getElementById("employeeIdDisplay");
      const newPassword = document.getElementById("newPassword");
      const confirmPassword = document.getElementById("confirmPassword");
      const formMessage = document.getElementById("formMessage");
      const formStatus = document.getElementById("formStatus");
      const submitButton = document.getElementById("submitButton");

      function setMessage(type, text) {
        formMessage.className = "form-message";
        if (type === "success") formMessage.classList.add("is-success");
        if (type === "error") formMessage.classList.add("is-error");
        formMessage.textContent = text;
      }

      async function postToAppsScript(payload) {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await response.text();
        return JSON.parse(text);
      }

      async function validateToken() {
        if (!token) {
          statusText.textContent = "This reset link is missing a token.";
          return;
        }

        try {
          const result = await postToAppsScript({
            action: "validateToken",
            token
          });

          if (!result.valid) {
            statusText.textContent = "This reset link is invalid, expired, or already used.";
            return;
          }

          employeeIdDisplay.value = result.employeeId || "Unknown";
          statusText.textContent = "Link validated. Set your new password below.";
          resetPanel.style.display = "block";
          formStatus.textContent = "Ready for submission.";
        } catch (error) {
          console.error(error);
          statusText.textContent = "There was a problem validating this reset link.";
        }
      }

      resetForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("", "");

        const password = newPassword.value;
        const confirm = confirmPassword.value;

        if (!password || !confirm) {
          setMessage("error", "Both password fields are required.");
          return;
        }

        if (password !== confirm) {
          setMessage("error", "Passwords do not match.");
          return;
        }

        submitButton.disabled = true;
        formStatus.textContent = "Setting password...";

        try {
          const result = await postToAppsScript({
            action: "resetPassword",
            token,
            newPassword: password
          });

          if (!result.success) {
            setMessage("error", result.error || "Unable to set password.");
            formStatus.textContent = "Reset failed.";
            submitButton.disabled = false;
            return;
          }

          setMessage("success", "Password set successfully. You may now sign in.");
          formStatus.textContent = "Password updated.";
          resetForm.reset();
          submitButton.disabled = true;
        } catch (error) {
          console.error(error);
          setMessage("error", "There was a problem setting your password.");
          formStatus.textContent = "Reset failed.";
          submitButton.disabled = false;
        }
      });

      validateToken();
    </script>
  </body>
</html>
