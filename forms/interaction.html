<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognitus Portal | Interaction Log</title>
    <meta name="theme-color" content="#0a1020" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="../employee.html" aria-label="Cognitus Portal home">
          <span class="brand-mark brand-mark-text">C</span>
          <span class="brand-lockup">
            <span class="brand-wordmark">Cognitus Portal</span>
            <span class="brand-sub">Interaction Log</span>
          </span>
        </a>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="../dashboard.html">Dashboard</a>
          <a href="../employee.html">Employee</a>
        </nav>
        <button class="button button-secondary" id="logoutButton" type="button">Log Out</button>
      </header>

      <main class="page-shell">
        <div class="narrow-shell">
          <span class="page-kicker">EMPLOYEE FORM</span>
          <h1 class="page-title">Customer interaction log.</h1>
          <p class="page-intro">Record a customer interaction clearly, professionally, and completely for manager review.</p>

          <section class="form-wrap" style="margin-top: 28px;">
            <form id="interactionForm" class="apply-form">
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label" for="interactionDate">Interaction Date</label>
                  <input class="form-input" id="interactionDate" type="date" required />
                </div>
                <div class="form-group">
                  <label class="form-label" for="interactionType">Interaction Type</label>
                  <input class="form-input" id="interactionType" type="text" placeholder="Example: support" required />
                </div>
                <div class="form-group full">
                  <label class="form-label" for="customerName">Customer Name</label>
                  <input class="form-input" id="customerName" type="text" placeholder="Optional name or identifier" />
                </div>
                <div class="form-group full">
                  <label class="form-label" for="summary">Summary</label>
                  <textarea class="form-textarea" id="summary" required></textarea>
                </div>
                <div class="form-group full">
                  <label class="form-label" for="outcome">Outcome</label>
                  <textarea class="form-textarea" id="outcome" required></textarea>
                </div>
              </div>
              <div id="formMessage" class="form-message"></div>
              <div class="form-actions">
                <button class="button button-primary" type="submit">Submit Log</button>
                <span class="inline-status" id="formStatus">Ready for submission.</span>
              </div>
            </form>
          </section>
        </div>
      </main>

      <footer class="footer"><p>© 2026 Cognitus Portal. Internal use only.</p></footer>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
      import { requireSession, attachLogout } from "../js/auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCnFyOTUVOxz14Ef2BwtcxdTAr3-xj3uwE",
        authDomain: "cognitus-solutio.firebaseapp.com",
        projectId: "cognitus-solutio",
        storageBucket: "cognitus-solutio.firebasestorage.app",
        messagingSenderId: "44920534330",
        appId: "1:44920534330:web:d295e189e573d40c360c03"
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const session = requireSession(["employee", "manager", "ownership"]);
      attachLogout();

      const form = document.getElementById("interactionForm");
      const formMessage = document.getElementById("formMessage");
      const formStatus = document.getElementById("formStatus");

      function setMessage(type, text) {
        formMessage.className = "form-message";
        if (type === "success") formMessage.classList.add("is-success");
        if (type === "error") formMessage.classList.add("is-error");
        formMessage.textContent = text;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("", "");
        formStatus.textContent = "Submitting interaction log...";
        try {
          await addDoc(collection(db, "interactionLogs"), {
            employeeId: session.employeeId,
            username: session.username,
            discordId: session.discordId || null,
            interactionDate: document.getElementById("interactionDate").value,
            customerName: document.getElementById("customerName").value.trim() || null,
            interactionType: document.getElementById("interactionType").value.trim(),
            summary: document.getElementById("summary").value.trim(),
            outcome: document.getElementById("outcome").value.trim(),
            followUpNeeded: false,
            submittedAt: serverTimestamp()
          });
          form.reset();
          setMessage("success", "Interaction log submitted successfully.");
          formStatus.textContent = "Log submitted.";
        } catch (error) {
          console.error(error);
          setMessage("error", "There was a problem submitting the interaction log.");
          formStatus.textContent = "Submission failed.";
        }
      });
    </script>
  </body>
</html>
